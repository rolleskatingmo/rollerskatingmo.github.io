<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>輪滑課程管理系統</title>
<style>
    /* ===== 全局重置與變數 ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f5f7fa;
        padding: 12px;
        color: #1e293b;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        background: transparent;
        padding: 0;
    }

    /* ===== 主要標題 ===== */
    h1 {
        font-size: 1.8rem;
        font-weight: 700;
        color: #0f172a;
        margin: 20px 0 16px;
        letter-spacing: -0.02em;
        padding: 0 4px;
    }

    /* ===== 搜尋卡片 ===== */
    .search-area {
        background: white;
        border-radius: 32px;
        padding: 24px 20px;
        margin-bottom: 24px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(226, 232, 240, 0.6);
    }

    .search-label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: #475569;
        margin-bottom: 8px;
    }

    #searchInput {
        padding: 14px 18px;
        border: 1px solid #d1d9e6;
        border-radius: 28px;
        font-size: 1rem;
        width: 100%;
        background: #ffffff;
        transition: border 0.2s, box-shadow 0.2s;
        font-family: inherit;
        -webkit-appearance: none;
        appearance: none;
    }

    #searchInput:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .search-hint {
        font-size: 0.85rem;
        color: #64748b;
        margin: 12px 0 8px;
        background: #f1f5f9;
        padding: 10px 14px;
        border-radius: 40px;
    }

    /* ===== 學生標籤 ===== */
    .student-list {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .student-tag {
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border-radius: 40px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 8px rgba(37,99,235,0.2);
        display: inline-block;
        -webkit-tap-highlight-color: rgba(37,99,235,0.3);
        touch-action: manipulation;
    }

    .student-tag:active {
        transform: translateY(0);
        opacity: 0.9;
    }

    /* ===== 訊息提示 ===== */
    .message {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        min-width: 240px;
        max-width: 90%;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 500;
        text-align: center;
        z-index: 30000;
        pointer-events: none;
        background: transparent;
    }

    .message > div {
        padding: 14px 24px;
        border-radius: 50px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .message.loading {
        background: #2563eb;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    .spinner-small {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top: 2px solid white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .success {
        background: rgba(34, 197, 94, 0.9);
        color: white;
    }

    .error {
        background: rgba(239, 68, 68, 0.9);
        color: white;
    }

    /* ===== 模態框 ===== */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        backdrop-filter: blur(6px);
    }

    .modal-content {
        background: white;
        border-radius: 40px;
        padding: 32px;
        max-width: 90%;
        width: 500px;
        max-height: 80vh;          /* 限制高度，超出可滾動 */
        overflow-y: auto;           /* 垂直滾動條 */
        box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
        animation: modalFadeIn 0.3s ease;
        -webkit-overflow-scrolling: touch; /* iOS 流暢滾動 */
    }

    @keyframes modalFadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .modal-content h2 {
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: #0f172a;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .modal-content h3 {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 20px 0 12px;
        color: #334155;
    }

    .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 40px;
        font-size: 0.75rem;
        font-weight: 600;
        text-align: center;
        white-space: nowrap;        /* 防止換行 */
    }

    .badge.red {
        background: #ef4444;
        color: white;
    }

    .badge.green {
        background: #16a34a;
        color: white;
    }

    .badge.blue {
        background: #2563eb;
        color: white;
    }

    .badge.yellow {
        background: #fbbf24;
        color: #78350f;
    }

    .warning-text {
        background: #ffedd5;
        border-left: 4px solid #f97316;
        padding: 12px 16px;
        border-radius: 20px;
        font-size: 0.9rem;
        color: #9a3412;
        margin: 16px 0;
    }

    .modal-info-row {
        display: flex;
        margin-bottom: 12px;
        background: #f8fafc;
        padding: 12px 16px;
        border-radius: 28px;
    }

    .modal-info-label {
        flex: 0 0 100px;
        font-weight: 500;
        color: #475569;
    }

    .modal-info-value {
        flex: 1;
        font-weight: 600;
        color: #0f172a;
    }

    .record-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
        margin-top: 16px;
    }

    .record-table th {
        text-align: left;
        padding: 12px 8px;
        background: #f1f5f9;
        font-weight: 600;
        color: #334155;
    }

    .record-table td {
        padding: 12px 8px;
        border-bottom: 1px solid #e2e8f0;
    }

    /* 日期欄位強制不換行，以便顯示星期 */
    .record-table td:first-child {
        white-space: nowrap;
    }

    .record-table tr:last-child td {
        border-bottom: none;
    }

    .makeup-row {
        background-color: #fee2e2 !important;
    }

    .modal-buttons {
        display: flex;
        gap: 16px;
        justify-content: flex-end;
        margin-top: 20px;
    }

    .modal-buttons button {
        padding: 12px 28px;
        border: none;
        border-radius: 40px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.95rem;
        background: #2563eb;
        color: white;
        box-shadow: 0 6px 12px -4px #2563eb80;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }

    .modal-buttons button:active {
        transform: translateY(0);
        opacity: 0.9;
    }

    /* ===== 頁腳 ===== */
    .footer {
        margin-top: 40px;
        font-size: 0.8rem;
        color: #64748b;
        text-align: center;
        border-top: 1px solid #e2e8f0;
        padding-top: 20px;
    }

    .footer p {
        margin-bottom: 5px;
    }

    /* ===== 教練入口浮動按鈕（藍色）===== */
    .coach-fab {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #2563eb;
        color: white;
        padding: 14px 24px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(37,99,235,0.3);
        z-index: 100;
        transition: 0.2s;
        font-size: 0.95rem;
        -webkit-tap-highlight-color: transparent;
        border: none;
        touch-action: manipulation;
    }

    .coach-fab:active {
        transform: translateY(0);
        opacity: 0.9;
    }

    /* ===== 手機適配 ===== */
    @media screen and (max-width: 600px) {
        body {
            padding: 8px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 16px 0 12px;
        }

        .search-area {
            padding: 20px 16px;
            border-radius: 28px;
        }

        .modal-content {
            padding: 28px 20px;
            border-radius: 36px;
        }

        .modal-content h2 {
            font-size: 1.4rem;
        }

        .modal-buttons button {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .coach-fab {
            bottom: 16px;
            right: 16px;
            padding: 12px 20px;
            font-size: 0.85rem;
        }

        .student-tag {
            padding: 10px 18px;
            font-size: 0.95rem;
        }

        .modal-info-row {
            padding: 10px 14px;
        }

        .modal-info-label {
            flex-basis: 80px;
            font-size: 0.9rem;
        }
    }

    @media screen and (max-width: 380px) {
        .student-list {
            flex-direction: column;
        }
        .student-tag {
            width: 100%;
            text-align: center;
        }
    }

    /* 改善觸控 */
    button, .student-tag, .coach-fab {
        touch-action: manipulation;
    }
</style>
</head>
<body>
    <a href="coach.html" class="coach-fab">⚙️ 教練入口 →</a>
    <div class="container">
        <h1>🛼 輪滑課程管理系統 · 家長查詢</h1>
        <div class="search-area">
            <label class="search-label">🔍 輸入學生姓名關鍵字</label>
            <input type="text" id="searchInput" placeholder="例如：王小明可輸入'王','小','小明'或'明'即可搜尋" autocomplete="off">
            <div class="search-hint">💡 點擊學生姓名可查看完整記錄（請假、租借、上課記錄）</div>
            <div id="studentList" class="student-list"></div>
        </div>
        <div id="message" class="message"></div>
        <div class="footer">
            <p>🛼滾軸溜冰私教輪滑團隊🛼</p>
            <p>⚠️ 教練若上課當下忘記點名，後續補點會顯示淡紅色背景, 但月份及日子是準確的</p>
            <p>⚠️ 每10節課週期內可請假2次，不扣除堂數。租借裝備每次 $20。</p>
            <p>系統版本 Version 6.0 By Thomas哥哥~有咩意見同迪哥哥講我改進下</p>
        </div>
    </div>

    <!-- 學生詳細資訊模態框 -->
    <div id="studentModal" class="modal-overlay">
        <div class="modal-content" id="modalContent">
            <!-- 動態填入 -->
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3UbuYFs6TYWyQBsdZ-cQDzpZs7ZItQ9UMv0OBQFDGvED8trPl9p2ABKoXbquLLkGcWQ/exec';

        const searchInput = document.getElementById('searchInput');
        const studentListDiv = document.getElementById('studentList');
        const messageDiv = document.getElementById('message');
        const modalOverlay = document.getElementById('studentModal');
        const modalContent = document.getElementById('modalContent');
        let searchTimer;
        let loadingTimeout = null;

        // 新增：取得星期幾
        function getWeekday(dateStr) {
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const d = new Date(dateStr + 'T00:00:00');
            return weekdays[d.getDay()];
        }

        function showLoading(message = '載入中...') {
            if (loadingTimeout) clearTimeout(loadingTimeout);
            messageDiv.innerHTML = `
                <div class="loading">
                    ${message}
                    <span class="spinner-small"></span>
                </div>
            `;
            messageDiv.className = 'message loading';
            messageDiv.style.display = 'flex';
        }

        function hideLoading() {
            messageDiv.style.display = 'none';
            if (loadingTimeout) clearTimeout(loadingTimeout);
        }

        function showMessage(msg, type = 'info') {
            hideLoading();
            const className = type === 'error' ? 'error' : 'success';
            messageDiv.innerHTML = `<div class="${className}">${msg}</div>`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        searchInput.addEventListener('input', function(e) {
            clearTimeout(searchTimer);
            const keyword = e.target.value.trim();
            if (keyword === '') {
                studentListDiv.innerHTML = '';
                return;
            }
            searchTimer = setTimeout(() => performSearch(keyword), 300);
        });

        async function performSearch(keyword) {
            showLoading('搜尋中...');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=searchStudent&keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error || '搜尋失敗');
                renderStudentList(data.students || []);
                hideLoading();
            } catch (err) {
                hideLoading();
                showMessage('❌ ' + err.message, 'error');
            }
        }

        function renderStudentList(students) {
            studentListDiv.innerHTML = '';
            if (students.length === 0) {
                studentListDiv.innerHTML = '<span style="color:#718096;">查無符合學生，請聯繫教練。</span>';
                return;
            }
            students.forEach(s => {
                const tag = document.createElement('span');
                tag.className = 'student-tag';
                tag.textContent = `${s.name} (${s.class})`;
                tag.addEventListener('click', () => loadStudentDetail(s.name));
                studentListDiv.appendChild(tag);
            });
        }

        async function loadStudentDetail(name) {
            showLoading('載入詳細記錄...');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getStudentDetails&name=${encodeURIComponent(name)}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderModal(data);
                modalOverlay.style.display = 'flex';
                hideLoading();
            } catch (err) {
                hideLoading();
                showMessage('❌ 無法載入記錄：' + err.message, 'error');
            }
        }

        function renderModal(d) {
            let leaveBadge = '';
            if (d.leaveCount >= 2) {
                leaveBadge = `<span class="badge red">⚠️ 請假 ${d.leaveCount} 次</span>`;
            } else {
                leaveBadge = `<span class="badge green">請假 ${d.leaveCount} 次</span>`;
            }

            let remainingDisplay = `<span style="font-size:1.5rem; font-weight:700;">${d.remainingClasses}</span>`;
            let remainingWarning = '';
            if (d.remainingClasses <= 0) {
                remainingDisplay = `<span style="font-size:1.5rem; font-weight:700; color:#b91c1c;">${d.remainingClasses} 堂</span>`;
                remainingWarning = `<div class="warning-text">❗ 剩餘課堂數已用完，請聯繫教練繳費。</div>`;
            } else if (d.remainingClasses <= 2) {
                remainingDisplay = `<span style="font-size:1.5rem; font-weight:700; color:#b45309;">${d.remainingClasses} 堂</span>`;
                remainingWarning = `<div class="warning-text">📌 剩餘課堂不多，請適時續費。</div>`;
            }

            // 只保留實際的上課記錄（點名扣課 和 補點名），忽略新增、續費、調整等
            let classRecordsFiltered = d.classRecords.filter(r => r.reason === '點名扣課' || r.reason === '補點名');
            let allRecords = [
                ...classRecordsFiltered.map(r => ({ ...r, type: '上課' })),
                ...d.leaveRecords.map(r => ({ date: r.date, type: '請假' }))
            ];
            // 按日期降序排列（最新的在上）
            allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));

            let recordsHtml = '';
            if (allRecords.length === 0) {
                recordsHtml = '<p style="color:#718096;">尚無任何上課或請假記錄。</p>';
            } else {
                recordsHtml = `<div style="overflow-x: auto;">
                    <table class="record-table">
                        <thead><tr><th>日期</th><th>時間</th><th>類型</th><th>剩餘堂數</th></tr></thead>
                        <tbody>`;
                allRecords.slice(0, 30).forEach(rec => {
                    const dateWithWeekday = `${rec.date} ${getWeekday(rec.date)}`;
                    if (rec.type === '上課') {
                        const isMakeup = rec.reason === '補點名';
                        const rowClass = isMakeup ? 'makeup-row' : '';
                        const typeLabel = isMakeup ? '補點名' : '上課';
                        recordsHtml += `<tr class="${rowClass}"><td>${dateWithWeekday}</td><td>${rec.time || ''}</td><td><span class="badge blue">${typeLabel}</span></td><td>${rec.remainingClasses}</td></tr>`;
                    } else {
                        recordsHtml += `<tr><td>${dateWithWeekday}</td><td>—</td><td><span class="badge yellow">請假</span></td><td>—</td></tr>`;
                    }
                });
                recordsHtml += `</tbody></table></div>`;
            }

            modalContent.innerHTML = `
                <h2>🧑‍🎓 ${d.name} ${leaveBadge}</h2>
                ${d.leaveCount >= 2 ? `<div class="warning-text">⚠️ 已請假 ${d.leaveCount} 次，下次請假將自動扣減1堂課。</div>` : ''}
                <div class="modal-info-row">
                    <span class="modal-info-label">班級</span>
                    <span class="modal-info-value">${d.class}</span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">剩餘課堂</span>
                    <span class="modal-info-value">${remainingDisplay}</span>
                </div>
                ${remainingWarning}
                <div class="modal-info-row">
                    <span class="modal-info-label">租借裝備</span>
                    <span class="modal-info-value">${d.rentalCount} 次 (每次 $20)</span>
                </div>
                <h3>📋 近期記錄</h3>
                ${recordsHtml}
                <div class="modal-buttons">
                    <button onclick="closeModal()">關閉</button>
                </div>
            `;
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
        }

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });
    </script>
</body>
</html>
